name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scheme:
        description: "Xcode scheme"
        required: false
        default: "SignTool"

jobs:
  build:
    runs-on: macos-26
    env:
      SCHEME: ${{ github.event.inputs.scheme || 'SignTool' }}
      PROJECT: SignTool.xcodeproj
      ARCHIVE_PATH: ${{ github.workspace }}/build/SignTool.xcarchive
      IPA_DIR: ${{ github.workspace }}/build/ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Download App Icon
        run: |
          curl -L "https://raw.githubusercontent.com/Astear17/SignTool/main/Resources/icon.png" \
            -o "Resources/Assets.xcassets/AppIcon.appiconset/icon.png"

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Archive (no code signing)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee /tmp/build.log | xcpretty ; \
          EXIT=${PIPESTATUS[0]} ; \
          if [ "$EXIT" -ne 0 ]; then \
            echo "=== BUILD ERRORS ===" ; \
            grep -E " error:|warning:| note:" /tmp/build.log | head -80 || true ; \
            echo "=== LAST 100 LINES ===" ; \
            tail -100 /tmp/build.log ; \
            exit "$EXIT" ; \
          fi

      - name: Package unsigned IPA
        run: |
          mkdir -p "$IPA_DIR/Payload"
          APP=$(find "$ARCHIVE_PATH/Products" -name "*.app" | head -1)
          cp -r "$APP" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr SignTool-unsigned.ipa Payload
          shasum -a 256 SignTool-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignTool-unsigned-ipa
          path: ${{ env.IPA_DIR }}/SignTool-unsigned.ipa
          retention-days: 30

      - name: Upload dSYMs
        uses: actions/upload-artifact@v4
        with:
          name: SignTool-dSYMs
          path: ${{ env.ARCHIVE_PATH }}/dSYMs
          retention-days: 30
          if-no-files-found: warn
