name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      scheme:
        description: "Xcode scheme"
        required: false
        default: "SignTool"

jobs:
  build:
    runs-on: macos-26

    env:
      SCHEME: ${{ github.event.inputs.scheme || 'SignTool' }}
      PROJECT: SignTool.xcodeproj
      ARCHIVE_PATH: ${{ github.workspace }}/build/SignTool.xcarchive
      IPA_DIR: ${{ github.workspace }}/build/ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Do NOT hard fail on Xcode path
      - name: Select Xcode (fallback safe)
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            echo "Xcode 16.2 not found, using default"
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Download App Icon
        run: |
          mkdir -p Resources/Assets.xcassets/AppIcon.appiconset
          curl -L "https://raw.githubusercontent.com/Astear17/SignTool/main/Resources/icon.png" \
            -o "Resources/Assets.xcassets/AppIcon.appiconset/icon.png"

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Build archive (unsigned)
        run: |
          set -o pipefail

          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | tee build.log

          EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            tail -100 build.log
            exit $EXIT
          fi

      - name: Verify archive
        run: |
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "Archive not found!"
            exit 1
          fi

      - name: Package IPA
        run: |
          mkdir -p "$IPA_DIR/Payload"

          APP=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "No .app found!"
            exit 1
          fi

          cp -r "$APP" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"

          zip -qr SignTool-unsigned.ipa Payload
          shasum -a 256 SignTool-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SignTool-unsigned-ipa
          path: ${{ env.IPA_DIR }}/SignTool-unsigned.ipa
          retention-days: 30

      - name: Upload dSYMs
        uses: actions/upload-artifact@v4
        with:
          name: SignTool-dSYMs
          path: ${{ env.ARCHIVE_PATH }}/dSYMs
          retention-days: 30
          if-no-files-found: warn
